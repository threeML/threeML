  upload_notebooks:
    needs: [fast_notebooks, fermi_notebooks, hal_notebooks, xspec_notebooks, multinest_notebooks,api_doc]
    name: "Upload notebooks and trigger RTD"
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v7
        with:
          name: notebooks-for-fermi-${{ github.sha }}
          path: docs/notebooks

      - uses: actions/download-artifact@v7
        with:
          name: notebooks-for-fast-${{ github.sha }}
          path: docs/notebooks

      - uses: actions/download-artifact@v7
        with:
          name: notebooks-for-hal-${{ github.sha }}
          path: docs/notebooks

      - uses: actions/download-artifact@v7
        with:
          name: notebooks-for-xspec-${{ github.sha }}
          path: docs/notebooks

      - uses: actions/download-artifact@v7
        with:
          name: notebooks-for-multinest-${{ github.sha }}
          path: docs/notebooks

      - name: Check that all notebooks are there
        shell: bash -l {0}
        run: |

          ls docs/notebooks
      
      - name: Set commit ref for RTD
        id: set_commit_ref
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "commit_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "commit_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
          
      - uses: actions/upload-artifact@v6
        with:
          name: notebooks-for-${{ steps.set_commit_ref.outputs.commit_ref }}
          path: docs/notebooks
          
      - name: Sleep for 10 min
        uses: juliangruber/sleep-action@v2
        with:
          time: 10m
          
      - name: Trigger RTDs build (Branches)
        if: github.event_name != 'pull_request'
        uses: dfm/rtds-action@main
        with:
          webhook_url: ${{ secrets.RTDS_WEBHOOK_URL }}
          webhook_token: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          commit_ref: ${{ steps.set_commit_ref.outputs.commit_ref }}
      
      - name: Trigger RTDs Build (Pull Requests)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          RTD_TOKEN: ${{ secrets.RTD_AUTH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RTD_PROJECT: "threeml" 
        run: |
          VERSION_SLUG="${PR_NUMBER}"
          echo "Triggering build for PR version: $VERSION_SLUG"
          
          # We use curl to hit the API v3 directly
          curl -X POST \
            -H "Authorization: Token $RTD_TOKEN" \
            -H "Content-Type: application/json" \
            "https://readthedocs.org/api/v3/projects/$RTD_PROJECT/versions/$VERSION_SLUG/builds/"

      - name: Documentation link for pull request
        if: github.event_name == 'pull_request'
        uses: readthedocs/actions/preview@v1
        with:
          project-slug: "threeml"


  api_doc:
    name: "Create the API stubs"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 # otherwise, you will failed to push refs to dest repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Build the API doc
        run: |

          brew install c-blosc
          brew install hdf5

          pip3 install tempita
          pip3 install blosc2 h5py
          pip3 install numpy scipy numba astropy pandas
          pip3 install wheel pkgconfig numexpr

          #python setup.py develop
          pip3 install -e .

          brew install sphinx-doc pandoc

          pip3 install mock 
          pip3 install sphinx-rtd-dark-mode
          pip3 install -U sphinx


          sphinx-apidoc -f -o docs/api/ threeML

      - name: Set commit ref for RTD
        id: set_commit_ref
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "commit_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "commit_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
      
      - uses: actions/upload-artifact@v6
        with:
          name: api-stubs-for-${{ steps.set_commit_ref.outputs.commit_ref }}
          path: docs/api




  build_docs:
    name: "Build the Documentation"
    runs-on: macos-latest
    needs: [upload_notebooks, api_doc]
    steps:


      - uses: actions/checkout@v4
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 # otherwise, you will failed to push refs to dest repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install package
        run: |

          brew install c-blosc
          brew install hdf5

          pip3 install wheel pkgconfig
          pip3 install blosc2 h5py

          brew install sphinx-doc pandoc

          pip3 install -U sphinx
          pip3 install mock 
          pip3 install sphinx-rtd-dark-mode 
          pip3 install -r docs/requirements.txt

          if [[ "${ISDEV}" == "true" ]]; then
            pip install --upgrade --pre astromodels
          else
            pip install --upgrade astromodels
          fi
          pip install -e .

          rm -rf docs/md_docs/*

        env:
          ISDEV: ${{contains(github.ref, 'dev') || contains(github.base_ref, 'dev')}}

      - name: Set commit ref for RTD
        id: set_commit_ref
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "commit_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "commit_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v7
        with:
          name: notebooks-for-${{ steps.set_commit_ref.outputs.commit_ref }}
          path: docs/notebooks


      - uses: actions/download-artifact@v7
        with:
          name: api-stubs-for-${{ steps.set_commit_ref.outputs.commit_ref }}
          path: docs/api


      - name: Build and Commit
        uses: sphinx-notes/pages@v2
        with:
          documentation_path: docs
          sphinx_version: 9.0.4
          requirements_path: docs/requirements.txt

      - name: Push changes
        if: github.event_name == 'push'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
