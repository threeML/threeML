name: Docs
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - dev
  release:

permissions:
  pull-requests: write

jobs:
  fast_notebooks:
    name: "Build the fast notebooks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
             auto-update-conda: true
             auto-activate: false
             mamba-version: "*"
             architecture: x64 
             activate-environment: test_env
             python-version: 3.11
             channels: threeml, conda-forge, fermi
             environment-file: ci/environment.yml 
             use-only-tar-bz2: false

      # is that really needed?
      - name: install latex
        uses: xu-cheng/texlive-action@v3
        with: 
          scheme: small

      - name: Install notebook dependencies 
        shell: bash -l {0}
        run: |
          set -e
          mamba install jupytext jupyterthemes ipython_genutils jupyter notebook black 


      - name: Install the package
        shell: bash -l {0}
        run: |
          if [[ "${ISDEV}" == "true" ]]; then
            mamba remove --force astromodels # rm astromodels without rm dependencies
            pip install --pre -U astromodels 
          fi
          pip install -e .
        env:
          ISDEV: ${{contains(github.ref, 'dev') || contains(github.base_ref, 'dev')}}
      - name: Conda list
        shell: bash -l {0}
        run: |
            mamba list

      - name: Execute the notebooks
        shell: bash -l {0}
        run: |
          # Make sure we fail in case of error
          set -e
          # copy the doc configuration over
          mkdir -p ~/.config/threeML
          cp threeML/data/doc_config.yml ~/.config/threeML/

          jupytext --to ipynb --pipe black --execute docs/md_docs/fast_execute/*.md

          mv docs/md_docs/fast_execute/*.ipynb docs/notebooks/

          ls docs/notebooks

        env:
          OMP_NUM_THREADS: 1
          MKL_NUM_THREADS: 1
          NUMEXPR_NUM_THREADS: 1
          MPLBACKEND: "Agg"

      - uses: actions/upload-artifact@v6
        with:
          name: notebooks-for-fast-${{ github.sha }}
          path: docs/notebooks

 
  hal_notebooks:
    name: "Build the HAL notebooks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache conda
        uses: actions/cache@v4
        env:
          # Increase this value to reset cache if etc/example-environment.yml has not changed
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key: conda-hal_notebooks-python-3.11-${{ hashFiles('ci/environment_hal.yml') }}

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
