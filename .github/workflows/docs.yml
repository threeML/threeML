          # brew install --cask basictex

          # eval "$(/usr/libexec/path_helper)"
          # sudo apt-get install texlive

          mamba install ${compilers} jupytext jupyterthemes jupyter_latex_envs texlive-core ipython_genutils jupyter notebook jupyterthemes jupyter_latex_envs

      - name: Install the package
        shell: bash -l {0}
        run: |
          pip install black 
          pip install --upgrade speclite
          #pip install git+https://github.com/desihub/speclite.git
          #pip install --no-binary :all: root_numpy
          
          if [[ "${ISDEV}" == "true" ]]; then
