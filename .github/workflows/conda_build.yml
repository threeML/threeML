name: Conda Build and Publish
on:
    push:
      paths-ignore:
        - "README.md"
        - "**/docs/**"
        - ".github/workflows/docs.yml"
      branches:
        - master
        - dev
      tags:
        - "v*"
    pull_request:
      branches:
        - master
        - dev
    schedule:
        - cron: "0 11 * * 1"

jobs:
    build-conda:
        name: Build and verify with Conda
        if: startsWith(github.ref, 'refs/tags') == false
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: ["ubuntu-latest", "macos-15-intel", "macos-latest","ubuntu-24.04-arm"]
                python-version: [3.11]
                include:
                  - environment: ci/environment_fermi.yml
                  - environment: ci/environment_macos-latest.yml
                    os: macos-latest
                  - environment: ci/environment_aarch64.yml
                    os: ubuntu-24.04-arm
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Add conda ${{ matrix.python-version }} to system path
              uses: conda-incubator/setup-miniconda@v4
              with:
                  activate-environment: "test_env"
                  auto-activate: false
                  miniforge-variant: Miniforge3
                  miniforge-version: latest
                  python-version: ${{ matrix.python-version }}
                  auto-update-conda: true
                  environment-file: ${{ matrix.environment }}
                  use-only-tar-bz2: false
                  mamba-version: "2.5"

            - name: Init Env
              shell: bash -l {0}
              run: |
                  mamba activate test_env
                  if [[ ${{ matrix.os }} == "macos-15-intel" ]]; then
                    mamba install -c conda-forge icu libxml2 libarchive --force-reinstall
                  fi

                  export PKG_VERSION=$(python -c "import versioneer;print(versioneer.get_version())")
                  echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV

                  echo "HOME= ${HOME}"
                  echo "Conda installation path ${CONDA}"
                  echo "Building ${PKG_VERSION} ..."
                  echo "Python version: ${{matrix.python-version}}"
                  echo "Running on development branch: ${ISDEV} "
                
                  if [[ "${ISDEV}" == "true" ]]; then
                    mamba install -c conda-forge -c threeml/label/dev "threeml/label/dev::astromodels"
                  fi
              env:
                  ISDEV: ${{contains(github.ref, 'dev') || contains(github.base_ref, 'dev')}}

            - name: Conda list
              shell: bash -l {0}
              run: |
                  conda list

            - name: Build the Distribution
              shell: bash -l {0}
              run: |
                  # Build package

                  #conda install conda-build -n base
                  conda activate test_env
                  conda install -c conda-forge boa icu libarchive conda-build 

                  conda config --set conda_build.pkg_format 2
                  conda config --set conda_build.zstd_compression_level 19
                  
                  if [[ "${ISDEV}" == "true" ]]; then
                    conda activate test_env
                    conda mambabuild conda-dist/recipe --override-channels -c https://conda.anaconda.org/threeml/label/dev -c https://heasarc.gsfc.nasa.gov/FTP/software/conda/ -c conda-forge # temporarily need to install xspec
                  else
                    conda activate test_env
                    conda mambabuild conda-dist/recipe --override-channels -c https://conda.anaconda.org/threeml -c conda-forge

                  fi
                  conda search -c ${CONDA}/conda-bld/ threeml --offline --use-local --info

              env:
                  PYTEST_ADDOPTS: "--color=yes"
                  OMP_NUM_THREADS: 1
                  MKL_NUM_THREADS: 1
                  NUMEXPR_NUM_THREADS: 1
                  MPLBACKEND: "Agg"
                  ISDEV: ${{contains(github.ref, 'dev') || contains(github.base_ref, 'dev')}}


    publish-conda:
        name: Publish to Conda
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: ["ubuntu-latest", "macos-15-intel", "macos-latest","ubuntu-24.04-arm"]
                python-version: [3.11]
                include:
                  - environment: ci/environment_fermi.yml
                  - environment: ci/environment_macos-latest.yml
                    os: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Add conda ${{ matrix.python-version }} to system path
              uses: conda-incubator/setup-miniconda@v4
              with:
                  activate-environment: "test_env"
                  auto-activate: false
                  miniforge-variant: Miniforge3
                  miniforge-version: latest 
                  python-version: ${{ matrix.python-version }}
                  auto-update-conda: true
                  environment-file: ${{ matrix.environment }}
                  use-only-tar-bz2: false
                  mamba-version: "2.5"

            - name: Init Env
              shell: bash -l {0}
              run: |
                  export PKG_VERSION=$(python -c "import versioneer;print(versioneer.get_version())")
                  echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV

                  echo "HOME= ${HOME}"
                  echo "Conda installation path ${CONDA}"
                  echo "Building ${PKG_VERSION} ..."
                  echo "Python version: ${{matrix.python-version}}"

            - name: Build the Distribution
              shell: bash -l {0}
              run: |
                  # Build package

                  #conda install conda-build -n base
                  conda activate test_env
                  conda install -c conda-forge boa icu libarchive conda-build

                  conda config --set conda_build.pkg_format 2
                  conda config --set conda_build.zstd_compression_level 19
  
                  conda mambabuild conda-dist/recipe --override-channels -c https://conda.anaconda.org/threeml -c conda-forge
                  conda search -c ${CONDA}/conda-bld/ threeml --offline --use-local --info


            - name: Publish to Conda
              shell: bash -l {0}
              run: |

                  conda install -c conda-forge anaconda-client
                  echo "Uploading ${{matrix.os}} IsDev: ${ISDEV} "

                  if [[ "${ISDEV}" == "true" ]]; then

                  LABEL="--label dev"

                  fi

                  if [[ "${{matrix.os}}" == "ubuntu-latest" ]]; then


                  anaconda -v --show-traceback -t $UPLOAD_TOKEN upload -u threeml ${CONDA}/conda-bld/linux-64/threeml*.conda --force $LABEL

                  elif [[ ${{matrix.os}} == macos-latest ]]; then

                  anaconda -v --show-traceback -t $UPLOAD_TOKEN upload -u threeml ${CONDA}/conda-bld/osx-arm64/threeml*.conda --force $LABEL

                  else

                  anaconda -v --show-traceback -t $UPLOAD_TOKEN upload -u threeml ${CONDA}/conda-bld/osx-64/threeml*.conda --force $LABEL

                  fi

              env:
                  UPLOAD_TOKEN: ${{secrets.CONDA_TOKEN}}
                  CURRENT_OS: ${{matrix.os}}
                  ISDEV: ${{contains(github.ref, 'dev')}}

