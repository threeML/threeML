name: Test Against XSPEC

on:
    push:
    schedule:
        - cron: "0 22 * * 0"

jobs:
    xspec-source-test:
        name: Test against XSPEC source - ${{ matrix.astro_source }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - astro_source: "standard"
                      astro_install: "pip install --upgrade astromodels"
                      extra_deps: ""
                    - astro_source: "master"
                      astro_install: "pip install -e git+https://github.com/threeML/astromodels.git@master#egg=astromodels"
                      extra_deps: "python -m pip install numpy numba"
                    - astro_source: "dev"
                      astro_install: "pip install -e git+https://github.com/threeML/astromodels.git@dev#egg=astromodels"
                      extra_deps: "python -m pip install numpy numba packaging"
                    - astro_source: "conda"
                      astro_install: "conda install -c threeml -c conda-forge astromodels"
                      extra_deps: ""
                      use_conda: true

        steps:
            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                  python-version: 3.11

            - name: Add conda to system path (conda jobs only)
              if: matrix.use_conda
              uses: conda-incubator/setup-miniconda@v3
              with:
                  activate-environment: "test_env"
                  auto-activate-base: false
                  miniforge-version: latest
                  architecture: "x64"
                  python-version: 3.11
                  auto-update-conda: true
                  channels: threeml, conda-forge, fermi, defaults
                  use-only-tar-bz2: false
                  channel-priority: true

            - name: Cache XSPEC
              uses: actions/cache@v4
              id: cache-xspec
              with:
                  path: ~/xspec_home
                  key: xspec-ver3

            - name: Get XSPEC
              env:
                  CACHE_HIT: ${{ steps.cache-xspec.outputs.cache-hit }}
              run: |
                  echo "getting latest heasoft bundle";
                  if [[ "$CACHE_HIT" == 'true' ]]; then
                      echo "Using cached XSPEC"
                  else
                      mkdir -p ~/xspec_home
                      wget -O heasoft-src.tar.gz 'https://heasarc.gsfc.nasa.gov/cgi-bin/Tools/tarit/tarit.pl?mode=download&arch=src&src_pc_linux_ubuntu=Y&src_other_specify=&general=heasptools&general=heagen&xspec=xspec' \
                          --header 'User-Agent: Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:84.0) Gecko/20100101 Firefox/84.0' \
                          --header 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8' \
                          --header 'Accept-Language: en-US' \
                          --header 'DNT: 1' \
                          --header 'Connection: keep-alive' \
                          --header 'Referer: https://heasarc.gsfc.nasa.gov/lheasoft/download.html' \
                          --header 'Upgrade-Insecure-Requests: 1' \
                          --header 'Sec-GPC: 1' \
                          --progress=dot:giga
                      mv heasoft-src.tar.gz ~/xspec_home/
                  fi

            - name: Extract XSPEC
              env:
                  CACHE_HIT: ${{ steps.cache-xspec.outputs.cache-hit }}
              run: |
                  if [[ "$CACHE_HIT" == 'true' ]]; then
                      echo "Using cached XSPEC installation"
                  else
                      echo "unpacking heasoft";
                      cd ~/xspec_home
                      tar -xzf heasoft-src.tar.gz;
                      ls heasoft*;
                      echo "compiling xspec";
                      sudo apt-get install -y gfortran build-essential cmake liblapack3 liblapack-dev libatlas3-base libatlas-base-dev libblas3 libblas-dev libreadline-dev libx11-dev libxt-dev;
                      XSPEC_BUILD_DIR=`ls -d heasoft-*/BUILD_DIR`;
                      pushd $XSPEC_BUILD_DIR;
                      mkdir -p ~/xspec_home/xspec-install/;
                      ./configure --prefix=/home/runner/xspec_home/xspec-install/ --with-components="Xspec" && make && make install | grep -v hd_install;
                      ls ~/xspec_home/xspec-install/x86_64-pc-linux-gnu-libc*/;
                      popd;
                      rm -rf $XSPEC_BUILD_DIR ~/xspec_home/heasoft-src.tar.gz
                  fi

            - name: Checkout
              uses: actions/checkout@v4

            - name: Install dependencies
              shell: bash -l {0}
              run: |
                  export HEADAS=`ls -d ~/xspec_home/xspec-install/x86_64-pc-linux-gnu-libc*/`;
                  echo "loading xspec from " $HEADAS;
                  source ${HEADAS}/headas-init.sh;
                  python -c 'import xspec' || true;

                  echo "Listing all libraries in xspec"
                  ls -l $HEADAS/lib/

                  python -m pip install --upgrade pip wheel
                  ${{ matrix.extra_deps }}
                  ${{ matrix.astro_install }}
                  pip install --upgrade flake8 coverage pytest-cov 
                  pip install -e .

            - name: Test xspec
              shell: bash -l {0}
              run: |
                  export HEADAS=`ls -d ~/xspec_home/xspec-install/x86_64-pc-linux-gnu-libc*/`;
                  echo "loading xspec from " $HEADAS;
                  source ${HEADAS}/headas-init.sh;
                  python -m pytest threeML/test/test_AAA_against_xspec.py


    xspec-conda-test:
        name: Test against XSPEC conda - ${{ matrix.astro_source }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - astro_source: "standard"
                      astro_install: "pip install --upgrade astromodels"
                      extra_deps: ""
                    - astro_source: "master"
                      astro_install: >
                        "conda uninstall astromodels -y" 
                        "pip install -e git+https://github.com/threeML/astromodels.git@master#egg=astromodels"
                      extra_deps: "python -m pip install numpy numba"
                    - astro_source: "dev"
                      astro_install: >
                        "conda uninstall astromodels -y" 
                        "pip install -e git+https://github.com/threeML/astromodels.git@dev#egg=astromodels"
                      extra_deps: "python -m pip install numpy numba packaging"
                    - astro_source: "conda"
                      astro_install: "conda install -c threeml -c conda-forge astromodels"
                      extra_deps: ""

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Add conda to system path
              uses: conda-incubator/setup-miniconda@v3
              with:
                  activate-environment: "test_env"
                  auto-activate-base: false
                  miniforge-version: latest
                  architecture: "x64"
                  python-version: 3.11
                  auto-update-conda: true
                  environment-file: ci/environment_xspec.yml
                  use-only-tar-bz2: false
                  channel-priority: true

            - name: Install dependencies
              shell: bash -l {0}
              run: |
                  echo "loading xspec from " $HEADAS;
                  python -c 'import xspec' || true;
                  
                  python -m pip install --upgrade pip wheel
                  ${{ matrix.extra_deps }}
                  ${{ matrix.astro_install }}
                  pip install --upgrade flake8 coverage pytest-cov 
                  pip install -e .
              env:
                  ASTRO_XSPEC_VERSION: 12.15.1

            - name: Test xspec
              shell: bash -l {0}
              run: |
                  echo "loading xspec from " $HEADAS
                  python -m pytest threeML/test/test_AAA_against_xspec.py 
