name: CI
on:
    push:
      paths-ignore:
        - "README.md"
        - "**/docs/**"
        - ".github/workflows/docs.yml"
      branches:
        - master
        - dev
      tags:
        - "v*"

    pull_request:
      branches:
        - master
        - dev

    schedule:
        - cron: "0 11 * * 1"

jobs:
    skip_duplicate:
        runs-on: ubuntu-latest
        outputs:
            should_skip: ${{ steps.skip_check.outputs.should_skip }}
        steps:
            - id: skip_check
              uses: fkirc/skip-duplicate-actions@master
              with:
                  github_token: ${{ github.token }}
                  concurrent_skipping: never
                  skip_after_successful_duplicate: true
                  paths_ignore: '["**/README.md", "**/docs/**"]'
                  do_not_skip: '["pull_request",  "schedule"]'

    test-pip:
        name: Test on Pip
        needs: skip_duplicate
        if: ${{ needs.skip_duplicate.outputs.should_skip == 'false' }}
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11","3.12","3.13"]
                os: ["ubuntu-latest", "macos-latest", "macos-15-intel"]
        runs-on:  ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip wheel setuptools numpy

                  if [[ ${{matrix.os}} != ubuntu-latest ]];
                  then
                    brew update
                    brew install hdf5 lzo c-blosc
                  fi

                  pip install astromodels

                  if [[ "${ISDEV}" == "true" ]]; then
                    pip install --upgrade --pre --no-deps astromodels
                  fi
                  
                  pip install --upgrade flake8 coverage pytest-cov 

                  pip install ultranest autoemcee zeus-mcmc
 
                  pip install -e .
              env:
                  ISDEV: ${{contains(github.ref, 'dev') || contains(github.base_ref, 'dev')}}
            - name: Lint with flake8
              run: |
                  flake8 . --count --show-source --statistics
                  flake8 . --count --exit-zero --max-complexity=10 --statistics

            - name: Test pip on ${{ matrix.python-version }}
              run: |
                  python -m pytest -vv --cov=threeML --cov-report=xml
              env:
                  PYTEST_ADDOPTS: "--color=yes"
                  OMP_NUM_THREADS: 1
                  MKL_NUM_THREADS: 1
                  NUMEXPR_NUM_THREADS: 1
                  MPLBACKEND: "Agg"

    test-dev:
        name: Test on Pip against astromodels-dev
        needs: skip_duplicate
        if: ${{ needs.skip_duplicate.outputs.should_skip == 'false' }}
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.11","3.12","3.13"]
                os: [ "ubuntu-latest", "macos-latest", "macos-15-intel"]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip wheel

                  if [[ ${{matrix.os}} != ubuntu-latest ]];
                  then
                    brew update
                    brew install hdf5 lzo c-blosc
                  fi

                  # install astromodels dev directly without cloning
                  pip install git+https://github.com/threeML/astromodels.git@dev
                  pip install --upgrade flake8 coverage pytest-cov 
                  pip install ultranest autoemcee zeus-mcmc

                  pip install -e .
            - name: Lint with flake8
              run: |
                  flake8 . --count --show-source --statistics
                  flake8 . --count --exit-zero --max-complexity=10 --statistics

            - name: Test pip on ${{ matrix.python-version }}
              run: |
                  python -m pytest -vv --cov=threeML --cov-report=xml
              env:
                  PYTEST_ADDOPTS: "--color=yes"
                  OMP_NUM_THREADS: 1
                  MKL_NUM_THREADS: 1
                  NUMEXPR_NUM_THREADS: 1
                  MPLBACKEND: "Agg"



    test-conda:
        name: Test on Conda
        needs: skip_duplicate
        if: ${{ needs.skip_duplicate.outputs.should_skip == 'false' }}
        strategy:
            fail-fast: false
            matrix:
                os: ["ubuntu-latest", "macos-15-intel", "macos-latest"]
                python-version: ["3.11", "3.12", "3.13"]
                include:
                  - environment: ci/environment_fermi.yml
                    architecture: x64
                    channels: threeml, conda-forge,fermi
                  - environment: ci/environment_macos-latest.yml
                    architecture: arm64
                    os: macos-latest
                    channels: threeml, conda-forge
                  - environment: ci/environment.yml
                    python-version: "3.12"
                    channels: threeml/label/dev, conda-forge, https://heasarc.gsfc.nasa.gov/FTP/software/conda
                  - environment: ci/environment.yml
                    python-version: "3.13"
                    channels: threeml/label/dev, conda-forge, https://heasarc.gsfc.nasa.gov/FTP/software/conda

        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: XCode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest
              if: runner.os == 'macOS'
            - name: Setup Miniconda
              uses: conda-incubator/setup-miniconda@v3
              with:
                  auto-update-conda: true
                  auto-activate: false
                  mamba-version: "*"
                  architecture: ${{ matrix.architecture }}
                  activate-environment: test_env
                  python-version: ${{ matrix.python-version }}
                  channels: ${{ matrix.channels }}
                  environment-file: ${{ matrix.environment }}
                  use-only-tar-bz2: false
            - name: Init Env
              shell: bash -l {0}
              run: |
                  pip install tomli
                  export PKG_VERSION=$(python -c "import versioneer;print(versioneer.get_version())")

                  echo "HOME= ${HOME}"
                  echo "Building ${PKG_VERSION} ..."
                  echo "Python version: ${{matrix.python-version}}"
                  echo "Running on development branch: ${ISDEV} "

                  if [[ "${ISDEV}" == "true" ]]; then
                    mamba install -c conda-forge -c threeml/label/dev "threeml/label/dev::astromodels"
                  fi

                  #pip install --upgrade speclite
                  #pip install fermipy 

              env:
                  ISDEV: ${{contains(github.ref, 'dev') || contains(github.base_ref, 'dev')}}
            - name: Conda list
              shell: bash -l {0}
              run: |
                  conda list
            - name: install it
              shell: bash -l {0}
              run: |
                  pip install -e .
            - name: Lint with flake8
              shell: bash -l {0}
              run: |
                  flake8 . --count --show-source --statistics
                  flake8 . --count --exit-zero --max-complexity=10 --statistics

            - name: test it
              shell: bash -l {0}
              run: |
                  python -m pytest -vv --cov=threeML --cov-report=xml

              env:
                  PYTEST_ADDOPTS: "--color=yes"
                  OMP_NUM_THREADS: 1
                  MKL_NUM_THREADS: 1
                  NUMEXPR_NUM_THREADS: 1
                  MPLBACKEND: "Agg"

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    publish-pypi:
        name: Publish to PyPi
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        runs-on: ubuntu-latest
        permissions:
            # IMPORTANT: this permission is mandatory for trusted publishing
            id-token: write
        steps:
            - name: Checkout source
              uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: 3.11
            - name: Build package
              run: |
                  pip install wheel setuptools -U
                  python setup.py sdist bdist_wheel
            - name: Publish
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  skip-existing: true

    test-publish-pypi:
        name: Build & verify package
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: 3.11

            - name: Install twine
              run: |
                  pip install twine build
                  pip install setuptools -U
            - name: Build package
              run: |
                python -m build --sdist --wheel
            - name: List result
              run: |
                  ls -lh dist
            - name: Check long_description
              run: |
                  python -m twine check dist/*
